<!DOCTYPE html>
<html lang="en">
<body>

<ul id="list">
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
</ul>

<script>
    const items = document.querySelectorAll("li");

    items.forEach(function(li) {
        li.addEventListener("click", function() {
            if (li.style.color === "red") {
                li.style.color = "black";
            } else {
                li.style.color = "red";
            }
        });
    });
</script>
</body>
</html>
